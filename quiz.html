<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture ActuQuiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white pb-20">
    <nav class="p-6 max-w-2xl mx-auto">
        <a href="index.html" class="text-blue-600 font-black uppercase text-[10px] tracking-widest hover:underline">← Retour au Hub</a>
    </nav>

    <article id="content" class="max-w-2xl mx-auto p-6 prose prose-slate lg:prose-xl"></article>
    
    <div class="max-w-2xl mx-auto p-2 md:p-8 bg-slate-50 rounded-[2.5rem] mt-10 border border-slate-100 shadow-inner">
        <h2 class="text-xl font-black mb-8 text-center uppercase tracking-[0.3em] italic text-slate-400">Le Quiz du jour</h2>
        <div id="quiz-zone"></div>
    </div>

    <script>
        // Récupère le nom du dossier dans l'URL (?folder=...)
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('folder');

        async function init() {
            if (!folder) {
                document.getElementById('content').innerHTML = "Erreur : Aucun dossier spécifié.";
                return;
            }

            try {
                // 1. Charger l'article HTML
                const resHtml = await fetch(`${folder}/contenu.html?v=${Date.now()}`);
                if (resHtml.ok) {
                    document.getElementById('content').innerHTML = await resHtml.text();
                }

                // 2. Charger le Quiz JSON
                const resJson = await fetch(`${folder}/metadata.json?v=${Date.now()}`);
                const data = await resJson.json();
                
                const zone = document.getElementById('quiz-zone');
                zone.innerHTML = ""; // Nettoyer la zone

                data.questions.forEach((q, i) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = "mb-12 p-4";
                    
                    // Titre de la question
                    questionDiv.innerHTML = `
                        <p class="font-black text-lg mb-6 leading-tight italic">
                            <span class="text-blue-600 mr-2">#${i+1}</span> ${q.q}
                            <span class="block mt-2 text-[9px] font-black uppercase tracking-widest text-slate-400">${q.theme}</span>
                        </p>
                    `;

                    // Boutons d'options
                    q.options.forEach((opt, idx) => {
                        const isCorrect = (idx === q.correct);
                        const btn = document.createElement('button');
                        btn.className = "block w-full text-left p-5 mb-3 bg-white border border-slate-200 rounded-2xl font-bold text-sm hover:border-blue-500 hover:bg-blue-50 transition-all shadow-sm";
                        btn.innerText = opt;
                        
                        btn.onclick = () => {
                            // Désactiver les boutons de cette question après le clic
                            const siblingBtns = btn.parentElement.querySelectorAll('button');
                            siblingBtns.forEach(b => b.disabled = true);
                            
                            // Colorer le bouton
                            btn.style.backgroundColor = isCorrect ? '#dcfce7' : '#fee2e2';
                            btn.style.borderColor = isCorrect ? '#22c55e' : '#ef4444';
                            
                            // Afficher l'explication
                            const explP = questionDiv.querySelector('.expl');
                            explP.innerText = (isCorrect ? "✅ " : "❌ ") + q.explication;
                            explP.classList.remove('hidden');
                        };
                        questionDiv.appendChild(btn);
                    });

                    // Zone d'explication (cachée au début)
                    const explArea = document.createElement('p');
                    explArea.className = "expl hidden mt-4 p-4 bg-slate-100 rounded-xl text-xs font-bold text-slate-600 italic leading-relaxed animate-in fade-in slide-in-from-top-2";
                    questionDiv.appendChild(explArea);

                    zone.appendChild(questionDiv);
                });

            } catch (err) {
                console.error("Erreur de chargement :", err);
                document.getElementById('quiz-zone').innerHTML = "<p class='text-center text-red-500 font-bold'>Erreur de chargement des données du quiz.</p>";
            }
        }

        init();
    </script>
</body>
</html>
