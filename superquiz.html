<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Quiz ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .theme-card input:checked + div { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
        /* Empêcher le rebond élastique sur mobile */
        html, body { overscroll-behavior: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div id="setup-ui" class="max-w-xl w-full bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h1 class="text-3xl font-black mb-6 italic uppercase tracking-tighter text-slate-900 text-center text-blue-600">Super Quiz ⚡</h1>
        <div id="themes-grid" class="grid grid-cols-2 gap-2 mb-6"></div>
        <div class="mb-8">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block border-b pb-2">Questions : <span id="qty-val" class="text-blue-600 font-black">15</span></label>
            <input type="range" id="qty-range" min="5" max="50" value="15" class="w-full accent-blue-600" oninput="document.getElementById('qty-val').innerText=this.value">
        </div>
        <button onclick="startChallenge()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">LANCER LE DÉFI</button>
        <button onclick="window.location.href='index.html'" class="w-full mt-4 text-slate-400 font-bold text-xs uppercase text-center">Retour au Hub</button>
    </div>

    <div id="quiz-ui" class="hidden max-w-xl w-full flex flex-col gap-4">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-100 flex flex-col min-h-[520px] relative">
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-2">
                    <span id="theme-tag" class="bg-blue-100 text-[9px] font-black px-3 py-1 rounded-full text-blue-600 uppercase italic">THÈME</span>
                    <span id="date-tag" class="bg-slate-100 text-[9px] font-black px-3 py-1 rounded-full text-slate-500 uppercase italic">DATE</span>
                </div>
                <span id="progress-text" class="text-xs font-bold text-slate-400 font-mono italic">01/15</span>
            </div>

            <div class="flex-grow">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-tight italic">...</h2>
                <div id="options" class="grid grid-cols-1 gap-3 mb-4"></div>
                
                <div id="explanation-box" class="hidden p-4 bg-blue-50 rounded-2xl border-l-4 border-blue-500 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <p id="explanation-text" class="text-sm text-slate-700 leading-relaxed font-medium italic"></p>
                </div>
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden mt-6 w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-xl active:scale-95 transition">
                CONTINUER ➔
            </button>
        </div>

        <button onclick="confirmExit()" class="py-2 text-slate-400 hover:text-red-500 text-[10px] font-black uppercase tracking-[0.2em] transition">
            ✕ Abandonner la session
        </button>
    </div>

    <div id="score-ui" class="hidden max-w-xl w-full bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 text-center">
        </div>

    <script>
        // ... (Ton code JavaScript précédent reste identique) ...
        // Assure-toi juste que la fonction render() et check() pointent vers les bons IDs
    </script>
</body>
</html>
