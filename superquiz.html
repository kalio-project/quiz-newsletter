<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Quiz ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .theme-card input:checked + div { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div id="setup-ui" class="max-w-xl w-full bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
        <h1 class="text-3xl font-black mb-6 italic uppercase tracking-tighter text-slate-900 text-center">Super Quiz ⚡</h1>
        
        <div class="mb-6">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 block border-b pb-2">Thèmes</label>
            <div id="themes-grid" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div class="mb-8">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block border-b pb-2">Questions : <span id="qty-val" class="text-blue-600 font-black">15</span></label>
            <input type="range" id="qty-range" min="5" max="50" value="15" class="w-full accent-blue-600" oninput="document.getElementById('qty-val').innerText=this.value">
        </div>

        <button onclick="startChallenge()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-blue-200 active:scale-95 transition">C'EST PARTI !</button>
    </div>

    <div id="quiz-ui" class="hidden max-w-xl w-full">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 relative min-h-[500px] flex flex-col">
            
            <div class="flex justify-between items-center mb-6">
                <span id="theme-tag" class="bg-blue-100 text-[10px] font-black px-3 py-1 rounded-full text-blue-600 uppercase">THÈME</span>
                <span id="progress-text" class="text-xs font-bold text-slate-400">01/15</span>
            </div>

            <div class="flex-grow">
                <h2 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-tight">...</h2>
                <div id="options" class="grid grid-cols-1 gap-3"></div>

                <div id="explanation-box" class="hidden mt-6 p-5 bg-slate-50 rounded-2xl border-l-4 border-blue-500 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <p class="text-xs font-black uppercase text-blue-600 mb-1">Le saviez-vous ?</p>
                    <p id="explanation-text" class="text-sm text-slate-600 leading-relaxed font-medium"></p>
                </div>
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden mt-8 w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 hover:bg-blue-600 transition">
                CONTINUER 
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        let pool = [];
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        const THEMES_LIST = ["POLITIQUE FR", "INTERNATIONAL", "ÉCONOMIE", "SOCIÉTÉ", "ENVIRONNEMENT", "TECH / SCIENCE", "SANTÉ", "CULTURE", "SPORT", "JUSTICE"];

        const grid = document.getElementById('themes-grid');
        THEMES_LIST.forEach(t => {
            grid.innerHTML += `
                <label class="theme-card cursor-pointer group">
                    <input type="checkbox" name="theme-choice" value="${t}" checked class="hidden">
                    <div class="border-2 border-slate-100 p-3 rounded-xl text-[10px] font-black uppercase text-center transition group-hover:border-blue-200 italic italic">${t}</div>
                </label>`;
        });

        async function startChallenge() {
            const selected = Array.from(document.querySelectorAll('input[name="theme-choice"]:checked')).map(i => i.value);
            const limit = parseInt(document.getElementById('qty-range').value);
            if(selected.length === 0) return alert("Choisis tes thèmes !");

            try {
                const res = await fetch('manifest.json');
                const manifest = await res.json();
                for(let item of manifest) {
                    const r = await fetch(`${item.folder}/metadata.json`);
                    const meta = await r.json();
                    const filtered = meta.questions.filter(q => selected.includes(q.theme));
                    pool.push(...filtered);
                }
                questions = pool.sort(() => Math.random() - 0.5).slice(0, limit);
                document.getElementById('setup-ui').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                render();
            } catch(e) { alert("Erreur chargement."); }
        }

        function render() {
            const q = questions[currentIdx];
            document.getElementById('theme-tag').innerText = q.theme;
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            const container = document.getElementById('options');
            container.innerHTML = "";
            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 font-bold hover:bg-slate-50 transition";
                b.innerText = opt;
                b.onclick = () => check(i);
                container.appendChild(b);
            });
        }

        function check(idx) {
            const q = questions[currentIdx];
            const btns = document.getElementById('options').children;
            
            // Désactiver les boutons
            for(let b of btns) b.onclick = null;

            if(idx === q.correct) {
                btns[idx].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                score++;
            } else {
                btns[idx].classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                btns[q.correct].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }

            // Afficher l'explication et le bouton suivant
            document.getElementById('explanation-text').innerText = q.explication;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < questions.length) render();
            else {
                alert(`🏁 FINI ! Score : ${score}/${questions.length}`);
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
