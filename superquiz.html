<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Super Quiz Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6 flex flex-col items-center">
    
    <header class="w-full max-w-2xl flex justify-between items-center mb-10">
        <a href="index.html" class="text-sm font-bold text-slate-400">← ABANDONNER</a>
        <div id="progress" class="text-xl font-black italic">SCORE: 0</div>
    </header>

    <div id="game-container" class="w-full max-w-2xl bg-white text-slate-900 rounded-[3rem] p-8 md:p-12 shadow-2xl min-h-[400px] flex flex-col justify-center relative">
        <div id="loader" class="text-center font-bold animate-pulse text-slate-400 text-sm uppercase tracking-widest">Initialisation du challenge...</div>
        
        <div id="quiz-ui" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="theme-tag" class="text-[10px] font-black bg-blue-600 text-white px-3 py-1 rounded-full uppercase tracking-widest">THEME</span>
                <span id="q-counter" class="text-xs font-bold text-slate-400 tracking-tighter">QUESTION 1/20</span>
            </div>
            
            <h2 id="q-text" class="text-2xl font-black mb-8 leading-tight">Chargement de la question...</h2>
            
            <div id="options-grid" class="grid grid-cols-1 gap-3 mb-8"></div>
            
            <div id="feedback" class="hidden animate-in fade-in slide-in-from-bottom-4">
                <p id="expl-text" class="text-slate-500 italic mb-6 text-sm border-l-4 border-slate-200 pl-4"></p>
                <button onclick="nextStep()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-[1.02] transition">Continuer →</button>
            </div>
        </div>

        <div id="final-screen" class="hidden text-center">
            <h2 class="text-2xl font-black mb-2 uppercase tracking-tighter">Challenge Terminé !</h2>
            <div id="final-score" class="text-8xl font-black text-blue-600 my-8">0</div>
            <p class="text-slate-400 font-bold text-sm mb-10 uppercase">Questions réussies</p>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest mb-4">Rejouer</button>
            <a href="index.html" class="block text-slate-400 font-bold text-xs uppercase underline">Retour au Hub</a>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let maxQty = 20;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            maxQty = parseInt(urlParams.get('qty')) || 20;

            try {
                // 1. Charger le manifest
                const resManifest = await fetch('manifest.json');
                const manifest = await resManifest.json();

                // 2. Charger les metadata de chaque dossier
                for (let item of manifest) {
                    const resMeta = await fetch(`${item.folder}/metadata.json`);
                    const meta = await resMeta.json();
                    allQuestions.push(...meta.questions);
                }

                // 3. Mélanger et limiter
                allQuestions.sort(() => Math.random() - 0.5);
                allQuestions = allQuestions.slice(0, maxQty);

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                renderQuestion();
            } catch (e) {
                document.getElementById('loader').innerText = "ERREUR: Pas encore assez de quiz archivés.";
            }
        }

        function renderQuestion() {
            const q = allQuestions[currentIdx];
            document.getElementById('theme-tag').innerText = q.theme;
            document.getElementById('q-counter').innerText = `QUESTION ${currentIdx + 1} / ${allQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('options-grid').classList.remove('hidden');

            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 border-2 border-slate-50 bg-slate-50 rounded-2xl font-bold text-sm hover:border-blue-500 transition-all";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, q.correct, q.explication, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(chosen, correct, expl, btn) {
            const isCorrect = (chosen === correct);
            if(isCorrect) {
                score++;
                btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
            } else {
                btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
            }
            
            document.getElementById('progress').innerText = `SCORE: ${score}`;
            document.getElementById('expl-text').innerText = (isCorrect ? "BRAVO ! " : "DOMMAGE... ") + expl;
            
            // On bloque les autres boutons
            const btns = document.querySelectorAll('#options-grid button');
            btns.forEach(b => b.disabled = true);
            
            setTimeout(() => {
                document.getElementById('options-grid').classList.add('hidden');
                document.getElementById('feedback').classList.remove('hidden');
            }, 600);
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < allQuestions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz-ui').classList.add('hidden');
                document.getElementById('final-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }

        init();
    </script>
</body>
</html>
