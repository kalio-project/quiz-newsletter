<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActuQuiz - Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black italic underline decoration-blue-500 text-slate-900 tracking-tighter cursor-pointer" onclick="location.reload()">ActuQuiz.</h1>
        
        <div class="relative w-40 md:w-64">
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="Rechercher..." class="w-full bg-white border border-slate-200 rounded-xl px-4 py-2 text-[11px] font-bold focus:outline-none focus:border-blue-500 shadow-sm transition italic">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 absolute right-3 top-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
    </header>

    <div id="grid" class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10"></div>

    <div class="max-w-4xl mx-auto mt-16 flex justify-center items-center gap-8">
        <button id="prev-btn" onclick="changePage(-1)" class="group flex items-center gap-2 text-slate-400 hover:text-blue-600 transition disabled:opacity-20 disabled:pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
            <span class="text-[10px] font-black uppercase tracking-widest italic">Précédent</span>
        </button>

        <span id="page-indicator" class="text-[10px] font-black text-slate-900 bg-white border border-slate-100 px-4 py-2 rounded-lg shadow-sm">PAGE 1</span>

        <button id="next-btn" onclick="changePage(1)" class="group flex items-center gap-2 text-slate-400 hover:text-blue-600 transition disabled:opacity-20 disabled:pointer-events-none">
            <span class="text-[10px] font-black uppercase tracking-widest italic">Suivant</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
        </button>
    </div>

    <button onclick="window.location.href='superquiz.html'" class="fixed bottom-6 right-6 bg-blue-600 text-white px-6 py-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition z-50 font-black text-[11px] uppercase italic">
        Super Quiz ⚡
    </button>

    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 8;

        async function init() {
            try {
                const response = await fetch('manifest.json?v=' + Date.now());
                allData = await response.json();
                filteredData = allData;
                renderGrid();
            } catch (error) {
                console.error("Erreur manifest", error);
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const slice = filteredData.slice(startIndex, endIndex);

            grid.innerHTML = slice.map(item => `
                <a href="quiz.html?folder=${item.folder}" class="group block animate-in fade-in duration-500">
                    <div class="overflow-hidden rounded-[2.5rem] bg-white border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-500">
                        <div class="aspect-[4/3] overflow-hidden">
                            <img src="${item.img}" class="h-full w-full object-cover group-hover:scale-105 transition duration-700" loading="lazy">
                        </div>
                        <div class="p-8">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 italic underline decoration-blue-500/30">${item.date}</p>
                            <h2 class="text-2xl font-black leading-tight text-slate-800 group-hover:text-blue-600 transition italic tracking-tighter">${item.titre}</h2>
                        </div>
                    </div>
                </a>
            `).join('');

            updateControls();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateControls() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            document.getElementById('prev-btn').disabled = (currentPage === 1);
            document.getElementById('next-btn').disabled = (currentPage >= totalPages);
            document.getElementById('page-indicator').innerText = `PAGE ${currentPage} / ${totalPages || 1}`;
        }

        function changePage(step) {
            currentPage += step;
            renderGrid();
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            currentPage = 1;
            filteredData = allData.filter(i => 
                i.titre.toLowerCase().includes(q) || 
                i.date.toLowerCase().includes(q)
            );
            renderGrid();
        }

        init();
    </script>
</body>
</html>
